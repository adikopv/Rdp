name: Eternal RDP Forge - Custom Domain

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install RDP
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies xorg xrdp dbus-x11
          sudo systemctl enable xrdp
          sudo systemctl start xrdp

      - name: Set Password
        run: |
          echo "runner:Kalix018" > /tmp/passwd.txt
          sudo chpasswd < /tmp/passwd.txt
          rm -f /tmp/passwd.txt
          sudo sed -i 's/^#*allow_blank_password=.*/allow_blank_password=false/' /etc/xrdp/xrdp.ini
          sudo systemctl restart xrdp

      - name: Install cloudflared
        run: |
          curl -L --retry 5 --retry-delay 5 https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/
          cloudflared --version

      - name: Debug Cloudflare
        run: |
          echo "=== DEBUG ==="
          echo "Account ID: ${{ secrets.CLOUDFLAREACCOUNTID }}"
          echo "Token (first 10 chars): ${{ secrets.CLOUDFLAREAPITOKEN }}"
          echo "Domain: ${{ secrets.CUSTOMDOMAIN }}"
          
          curl -X GET "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLAREACCOUNTID }}" \
               -H "Authorization: Bearer ${{ secrets.CLOUDFLAREAPITOKEN }}" \
               -H "Content-Type: application/json"

      - name: Auth Tunnel
        run: |
          echo "${{ secrets.CLOUDFLAREAPITOKEN }}" | cloudflared tunnel login
          cloudflared tunnel create rdp-eternal || echo "Tunnel exists"

      - name: Route Domain
        run: |
          TUNNEL_ID=$(cloudflared tunnel list | grep rdp-eternal | awk '{print $1}')
          if [ -z "$TUNNEL_ID" ]; then
            echo "❌ Tunnel not found!"
            exit 1
          fi
          echo "Tunnel ID: $TUNNEL_ID"
          cloudflared tunnel route dns $TUNNEL_ID ${{ secrets.CUSTOMDOMAIN }} || echo "DNS route exists"
          mkdir -p ~/.cloudflared
          cat > ~/.cloudflared/config.yml <<EOF
          tunnel: $TUNNEL_ID
          credentials-file: /home/runner/.cloudflared/$TUNNEL_ID.json
          ingress:
            - hostname: ${{ secrets.CUSTOMDOMAIN }}
              service: rdp://localhost:3389
            - service: http_status:404
          EOF

      - name: Launch Tunnel
        run: |
          nohup cloudflared tunnel --config ~/.cloudflared/config.yml run > tunnel.log 2>&1 &
          sleep 15
          cat tunnel.log
          if grep -q "connection established" tunnel.log; then
            echo "✅ Tunnel established!"
          else
            echo "⚠️ Tunnel may not be ready. Continuing..."
          fi

      - name: Notify Telegram
        run: |
          URL="https://${{ secrets.CUSTOMDOMAIN }}"
          MSG="✅ RDP ACTIVE%0A🔗 $URL%0A👤 User: runner%0A🔑 Pass: Kalix018%0A⏳ Valid for 6 hours"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAMBOTTOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAMCHATID }}" \
            -d text="$MSG"

      - name: Keep Alive
        run: sleep 999999999
